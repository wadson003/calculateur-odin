<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Calculatrice JavaScript</title>
    <link rel="stylesheet" href="calculatrice.css">
</head>
<body>

  <div class="calculatrice">
    <div id="ecran">0</div>

  <div class="bouttons">
    <button class="btn clear" id="effacer">AC</button>

  <button class="btn operator" data-op="diviser">/</button>
  <button class="btn operator" data-op="multiplier">*</button>
  <button class="btn operator" data-op="soustraire">-</button>
  <button class="btn operator" data-op="ajouter">+</button>

  <button class="btn number">9</button>
  <button class="btn number">8</button>
  <button class="btn number">7</button>
  <button class="btn number">6</button>
  <button class="btn number">5</button>
  <button class="btn number">4</button>
  <button class="btn number">3</button>
  <button class="btn number">2</button>
  <button class="btn number">1</button>
  <button class="btn number">0</button>

  <button class="btn number">.</button>

  <button class= "btn egal" id="egals">=</button>
  </div>
  </div>
    <script src="calculatrice.js" defer></script>
</body>
</html>
